<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2f4050;
            --primary-dark: #283848;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --light: #f9fafc;
            --gray-light: #eaeaea;
            --gray: #d1d5db;
            --text: #333;
            --text-light: #6b7280;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s ease;
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(to bottom, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 0;
            position: fixed;
            height: 100vh;
            box-shadow: var(--shadow);
            z-index: 100;
            transition: var(--transition);
        }

        .logo-container {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sidebar-nav {
            padding: 20px 15px;
        }

        .nav-item {
            text-decoration: none;
            color: var(--white);
            display: flex;
            align-items: center;
            padding: 12px 15px;
            font-size: 16px;
            border-radius: 8px;
            transition: var(--transition);
            margin-bottom: 8px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(59, 130, 246, 0.2);
        }

        .nav-item i {
            margin-right: 12px;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            margin-left: 280px;
            transition: var(--transition);
        }

        /* Header */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-light);
        }

        .dashboard-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 14px;
        }

        /* Sections */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 22px;
            color: var(--primary);
        }

        section {
            background: var(--white);
            padding: 25px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        section:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Recent Cases */
        .cases-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .case-item {
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            padding: 20px;
            transition: var(--transition);
        }

        .case-item:hover {
            border-color: var(--accent);
        }

        .case-client {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .case-title {
            color: var(--text-light);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .case-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--gray-light);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--white);
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            display: inline-block;
            width: 100%;
            text-align: center;
        }

        .btn-primary:hover {
            background: var(--accent-dark);
        }

        /* Upcoming Milestones */
        .milestones-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .milestone-item {
            border: 1px solid var(--gray-light);
            border-radius: var(--border-radius);
            padding: 20px;
            transition: var(--transition);
        }

        .milestone-item:hover {
            border-color: var(--accent);
        }

        .milestone-client {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .milestone-name {
            color: var(--text);
            margin-bottom: 8px;
        }

        .milestone-due {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .milestone-item select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--gray);
            background: var(--white);
            color: var(--text);
            font-family: inherit;
        }

        .milestone-item select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 80px;
            }
            
            .logo {
                font-size: 16px;
            }
            
            .logo-container {
                padding: 20px 10px;
            }
            
            .nav-item span {
                display: none;
            }
            
            .nav-item i {
                margin-right: 0;
                font-size: 20px;
            }
            
            .main-content {
                margin-left: 80px;
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .cases-list, .milestones-list {
                grid-template-columns: 1fr;
            }
        }

        /* Menu Toggle for Mobile */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--primary);
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 101;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            background: var(--success);
            color: white;
            box-shadow: var(--shadow);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo-container">
                <div class="logo">Soven <span>Legal</span></div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/lawyer-dashboard" class="nav-item active"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
                <a href="/lawyer-cases" class="nav-item"><i class="fas fa-briefcase"></i> <span>My Cases</span></a>
                <a href="/lawyer/chat-interface" class="nav-item"><i class="fas fa-comments"></i> <span>Client Messages</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <h1>Lawyer Dashboard</h1>
                <div class="header-actions">
                    <span>Welcome, {{ lawyer.name }}</span>
                </div>
            </header>

            <!-- Stats Grid -->
            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">{{ stats.active_cases }}</div>
                    <div class="stat-label">Active Cases</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">{{ stats.completed_cases }}</div>
                    <div class="stat-label">Completed Cases</div>
                </div>
            </section>

            <!-- Recent Cases -->
            <section class="recent-cases">
                <div class="section-header">
                    <h2>Recent Cases</h2>
                </div>
                <div class="cases-list">
                    {% for case in recent_cases %}
                    <div class="case-item">
                        <div class="case-client">{{ case.client_name }}</div>
                        <div class="case-title">{{ case.case_title }}</div>
                        <div class="case-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: {{ case.progress }}%"></div>
                            </div>
                            <span>{{ case.progress }}%</span>
                        </div>
                        <button class="btn-primary" onclick="viewCase('{{ case._id }}')">View Case</button>
                    </div>
                    {% endfor %}
                </div>
            </section>

            
        </main>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        }); 

        function viewCase(caseId) {
            window.location.href = `/lawyer-case-details/${caseId}`;
        }

        function updateMilestoneStatus(milestoneId, status) {
            fetch(`/api/update-milestone-status/${milestoneId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: status})
            }).then(response => response.json())
            .then(data => {
                if (data.success) {
                    showNotification('Milestone status updated', 'success');
                }
            });
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>

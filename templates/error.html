<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Soven Legal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');

:root{
  --cream:#F8F5F0;
  --warm-white:#FDFCFA;
  --ink:#1A1814;
  --ink-muted:#4A4640;
  --ink-light:#8A8480;
  --gold:#B8922A;
  --gold-light:#D4A843;
  --gold-pale:#F5EDD8;
  --sage:#4A5E52;
  --sage-light:#EEF2EF;
  --border:#E4DDD4;
  --border-dark:#C8BFB4;
  --danger:#C0392B;
  --sidebar-w:260px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.7;
}

/* SIDEBAR */

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:var(--sidebar-w);
  height:100vh;
  background:var(--ink);
  display:flex;
  flex-direction:column;
  z-index:200;
}

.logo-container{
  padding:28px 24px 22px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem;
  font-weight:500;
  color:white;
}

.logo span{
  color:var(--gold-light);
}

.sidebar ul{
  list-style:none;
  padding:14px 0;
  flex:1;
}

.sidebar ul li{
  margin:2px 12px;
}

.sidebar ul li a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 14px;
  border-radius:6px;
  text-decoration:none;
  color:rgba(255,255,255,0.55);
  font-size:0.82rem;
  transition:0.2s;
}

.sidebar ul li a:hover{
  background:rgba(255,255,255,0.05);
  color:white;
}

.sidebar-footer{
  padding:16px 20px;
  border-top:1px solid rgba(255,255,255,0.08);
}

.sidebar-footer p{
  font-size:0.7rem;
  color:rgba(255,255,255,0.25);
}

/* MAIN */

.main-content{
  margin-left:var(--sidebar-w);
  min-height:100vh;
  padding:36px 40px;
}

/* HEADER */

header{
  background:white;
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px 28px;
  margin-bottom:30px;
}

header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;
  font-weight:500;
  color:var(--ink);
}

/* ERROR CARD */

.error-container{
  background:white;
  border:1px solid var(--border);
  border-radius:10px;
  padding:60px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:60vh;
}

.error-icon{
  font-size:4rem;
  color:var(--danger);
  margin-bottom:24px;
}

.error-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;
  font-weight:500;
  color:var(--ink);
  margin-bottom:14px;
}

.error-message{
  font-size:0.95rem;
  color:var(--ink-muted);
  max-width:650px;
  margin-bottom:34px;
  line-height:1.9;
}

/* BUTTONS */

.error-actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  height:42px;
  padding:0 20px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:0.72rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  transition:0.2s;
}

.btn-primary{
  background:var(--gold);
  color:white;
}

.btn-primary:hover{
  background:#9A7A22;
  color:white;
}

.btn-secondary{
  background:transparent;
  border:1px solid var(--border-dark);
  color:var(--ink-muted);
}

.btn-secondary:hover{
  border-color:var(--ink);
  color:var(--ink);
}

/* RESPONSIVE */

@media(max-width:900px){

  :root{
    --sidebar-w:0px;
  }

  .sidebar{
    transform:translateX(-260px);
  }

  .main-content{
    margin-left:0;
    padding:24px 20px;
  }
}

@media(max-width:768px){

  .error-container{
    padding:40px 24px;
  }

  .error-title{
    font-size:2rem;
  }

  .error-actions{
    flex-direction:column;
    width:100%;
  }

  .btn{
    width:100%;
  }
}
</style>
</head>
<body>
    
    <div class="sidebar">
        <div class="logo-container">
            <h2 class="logo">Soven <span>Legal</span></h2>
        </div>
        <ul>
            <li><a href="/dashboard"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
            <li><a href="/documents"><i class="fas fa-file-alt"></i> <span>Documents</span></a></li>
            <li><a href="/lawyers"><i class="fas fa-user-tie"></i> <span>Find Lawyers</span></a></li>
            <li><a href="/chat-interface"><i class="fas fa-comments"></i> <span>Messages</span></a></li>
            <li><a href="/legal-aid"><i class="fas fa-hands-helping"></i> <span>Legal Help</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <p>&copy; 2023 Soven Legal</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <h1>Error</h1>
        </header>

        <div class="error-container">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <h2 class="error-title">Oops! Something went wrong</h2>
            <p class="error-message">{{ message or "An unexpected error occurred. Please try again." }}</p>
            
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
                <a href="/dashboard" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go to Dashboard
                </a>
                <a href="/documents" class="btn btn-primary">
                    <i class="fas fa-file-alt"></i> Go to Documents
                </a>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawyer Signup | Soven Legal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="static/css/lawyer_signup.css">
</head>
<body>
  <div class="signup-container">
    <div class="signup-header">
      <h1>Join Soven Legal</h1>
      <p>Create your lawyer account in a few simple steps</p>
    </div>
    
    <div class="signup-body">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-step completed" id="step1Progress">
          <span class="step-label">Basic Info</span>
        </div>
        <div class="progress-step active" id="step2Progress">
          <span class="step-label">Professional</span>
        </div>
        <div class="progress-step" id="step3Progress">
          <span class="step-label">Work & Bio</span>
        </div>
        <div class="progress-step" id="step4Progress">
          <span class="step-label">Review</span>
        </div>
      </div>

      <form id="signupForm">
        <!-- Step 1: Basic Info -->
        <div class="step active" id="step1">
          <h2 class="step-title">Personal Information</h2>
          
          <div class="form-grid">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
            </div>
            
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Create a strong password" required>
              <div class="password-strength">
                <div class="password-strength-bar" id="passwordStrengthBar"></div>
              </div>
              <div class="password-feedback" id="passwordFeedback"></div>
            </div>
            
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" required>
            </div>
            
            <div class="form-group full-width">
              <div class="checkbox-container">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
              </div>
            </div>
          </div>
          
          <div class="btn-container">
            <div></div> 
            <span>Already Registered? <a class="login_span" action = "/lawyer-login">Login</a></span>
            <button type="button" class="btn btn-next" data-next="step2">Next <i class="fas fa-arrow-right"></i></button>
          </div>
        </div>

        <!-- Step 2: Professional Details -->
        <div class="step" id="step2">
          <h2 class="step-title">Professional Details</h2>
          
          <div class="form-grid">
            <div class="form-group full-width">
              <label for="specialization">Specializations (Select multiple with Ctrl/Cmd)</label>
              <select name="specialization" id="specialization" multiple required>
                <option value="Civil">Civil Law</option>
                <option value="Corporate">Corporate Law</option>
                <option value="Immigration">Immigration Law</option>
                <option value="Criminal">Criminal Law</option>
                <option value="Family">Family Law</option>
                <option value="Intellectual Property">Intellectual Property</option>
                <option value="Real Estate">Real Estate Law</option>
                <option value="Tax">Tax Law</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="experience">Years of Experience</label>
              <input type="number" id="experience" name="experience" min="0" max="50" placeholder="5" required>
            </div>
            
            <div class="form-group">
              <label for="barNumber">Bar Association Number</label>
              <input type="text" id="barNumber" name="barNumber" placeholder="e.g. NY12345" required>
            </div>
            
            <div class="form-group">
              <label for="location">Location (City, Country)</label>
              <input type="text" id="location" name="location" placeholder="New York, USA" required>
            </div>
          </div>
          
          <div class="btn-container">
            <button type="button" class="btn btn-prev" data-prev="step1"><i class="fas fa-arrow-left"></i> Back</button>
            <button type="button" class="btn btn-next" data-next="step3">Next <i class="fas fa-arrow-right"></i></button>
          </div>
        </div>

        <!-- Step 3: Work & Bio -->
        <div class="step" id="step3">
          <h2 class="step-title">Work & Biography</h2>
          
          <div class="form-grid">
            <div class="form-group">
              <label for="fee">Consultation Fee (USD)</label>
              <input type="number" id="fee" name="fee" min="0" placeholder="100" required>
            </div>
            
            <div class="form-group">
              <label for="currency">Currency</label>
              <select id="currency" name="currency" required>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
                <option value="INR">INR (₹)</option>
                <option value="AUD">AUD (A$)</option>
              </select>
            </div>
            
            <div class="form-group full-width">
              <label for="bio">Professional Bio</label>
              <textarea id="bio" name="bio" rows="4" placeholder="Briefly describe your professional background and expertise..." required></textarea>
            </div>
            
            <div class="form-group full-width">
              <label>Previous Work (Optional)</label>
              <input type="text" name="work_title_1" placeholder="Case Title 1">
              <textarea name="work_desc_1" rows="2" placeholder="Case Description 1" class="mt-10"></textarea>
              
              <input type="text" name="work_title_2" placeholder="Case Title 2" class="mt-15">
              <textarea name="work_desc_2" rows="2" placeholder="Case Description 2" class="mt-10"></textarea>
            </div>
          </div>
          
          <div class="btn-container">
            <button type="button" class="btn btn-prev" data-prev="step2"><i class="fas fa-arrow-left"></i> Back</button>
            <button type="button" class="btn btn-next" data-next="step4">Next <i class="fas fa-arrow-right"></i></button>
          </div>
        </div>

        <!-- Step 4: Review -->
        <div class="step" id="step4">
          <h2 class="step-title">Review Your Information</h2>
          
          <div class="review-container">
            <div class="review-item">
              <div class="review-label">Personal Information</div>
              <div class="review-value" id="review-personal"></div>
            </div>
            
            <div class="review-item">
              <div class="review-label">Professional Details</div>
              <div class="review-value" id="review-professional"></div>
            </div>
            
            <div class="review-item">
              <div class="review-label">Work & Bio</div>
              <div class="review-value" id="review-work"></div>
            </div>
            
            <div class="form-group full-width">
              <div class="checkbox-container">
                <input type="checkbox" id="verification" name="verification" required>
                <label for="verification">I verify that all information provided is accurate</label>
              </div>
            </div>
          </div>
          
          <div class="btn-container">
            <button type="button" class="btn btn-prev" data-prev="step3"><i class="fas fa-arrow-left"></i> Back</button>
            <button type="submit" class="btn btn-submit">Submit Application <i class="fas fa-check"></i></button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="static/js/lawyer_signup.js"></script>
</body>
</html>

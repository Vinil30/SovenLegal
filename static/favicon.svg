  <line x1="310" y1="90" x2="370" y2="90" stroke="#0F1A2E" stroke-width="2.8" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(15, 26, 46);color:rgb(255, 255, 255);stroke-width:2.8px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

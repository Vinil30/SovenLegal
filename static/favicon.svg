  <path d="M296 120 Q310 132 324 120" fill="none" stroke="#0F1A2E" stroke-width="2.4" stroke-linecap="round" style="fill:none;stroke:rgb(15, 26, 46);color:rgb(255, 255, 255);stroke-width:2.4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <path d="M340 52 L398 74 L398 128 C398 166 372 190 340 202 C308 190 282 166 282 128 L282 74 Z" fill="#C89B3C" style="fill:rgb(200, 155, 60);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>


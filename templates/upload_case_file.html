<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Case File - Legal Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');

:root{
    --cream:#F8F5F0;
    --warm-white:#FDFCFA;
    --ink:#1A1814;
    --ink-muted:#4A4640;
    --ink-light:#8A8480;
    --gold:#B8922A;
    --gold-light:#D4A843;
    --gold-pale:#F5EDD8;
    --sage:#4A5E52;
    --sage-light:#EEF2EF;
    --border:#E4DDD4;
    --border-dark:#C8BFB4;
    --danger:#C0392B;
    --success:#4A5E52;
    --sidebar-w:260px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'DM Sans',sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.7;
    min-height:100vh;
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:var(--sidebar-w);
    background:var(--ink);
    height:100vh;
    position:fixed;
    display:flex;
    flex-direction:column;
    z-index:200;
}

.logo-container{
    padding:28px 24px 22px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-family:'Cormorant Garamond',serif;
    font-size:1.5rem;
    font-weight:500;
    color:white;
}

.logo span{
    color:var(--gold-light);
}

.sidebar ul{
    list-style:none;
    padding:14px 0;
    flex:1;
}

.sidebar ul li{
    margin:2px 12px;
}

.sidebar ul li a{
    text-decoration:none;
    color:rgba(255,255,255,0.55);
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px 14px;
    border-radius:6px;
    font-size:0.82rem;
    transition:0.2s;
}

.sidebar ul li a:hover{
    background:rgba(255,255,255,0.05);
    color:white;
}

.sidebar ul li a.active{
    background:rgba(184,146,42,0.16);
    border:1px solid rgba(184,146,42,0.22);
    color:white;
}

.sidebar ul li a i{
    width:16px;
    text-align:center;
}

.sidebar-footer{
    padding:16px 20px;
    border-top:1px solid rgba(255,255,255,0.08);
    text-align:center;
}

.sidebar-footer p{
    font-size:0.7rem;
    color:rgba(255,255,255,0.25);
}

/* MAIN */

.upload-container{
    max-width:760px;
    width:100%;
    margin:40px auto;
    padding:20px;
    flex:1;
    margin-left:calc(var(--sidebar-w) + 40px);
}

/* CARD */

.upload-card{
    background:var(--warm-white);
    border-radius:10px;
    padding:2.8rem;
    border:1px solid var(--border);
    box-shadow:0 10px 30px rgba(26,24,20,0.05);
    transition:0.25s ease;
}

.upload-card:hover{
    transform:translateY(-2px);
    box-shadow:0 16px 34px rgba(26,24,20,0.08);
}

/* HEADER */

.upload-header{
    text-align:center;
    margin-bottom:2rem;
    padding-bottom:1.5rem;
    border-bottom:1px solid var(--border);
}

.upload-header h2{
    font-family:'Cormorant Garamond',serif;
    color:var(--ink);
    font-size:2.3rem;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.upload-header i{
    color:var(--gold);
    font-size:2rem;
}

/* FORM */

.form-label{
    font-size:0.82rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-muted);
    margin-bottom:10px;
    display:block;
}

.form-control,
.form-select{
    height:48px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--warm-white);
    padding:0 16px;
    font-family:inherit;
    font-size:0.84rem;
    transition:0.2s;
}

.form-control:focus,
.form-select:focus{
    border-color:var(--gold);
    box-shadow:none;
    outline:none;
}

/* FILE DROP */

.file-drop-area{
    border:2px dashed var(--border-dark);
    border-radius:10px;
    padding:50px 20px;
    text-align:center;
    background:var(--cream);
    cursor:pointer;
    transition:0.25s ease;
}

.file-drop-area:hover{
    border-color:var(--gold);
    background:var(--gold-pale);
}

.file-drop-area.dragover{
    border-color:var(--success);
    background:var(--sage-light);
}

.file-drop-area i{
    font-size:3rem;
    color:var(--gold);
    margin-bottom:16px;
}

.file-drop-area p{
    margin-bottom:6px;
    color:var(--ink);
}

.file-drop-area .small{
    font-size:0.78rem;
    color:var(--ink-light);
}

/* FILE INFO */

.file-info{
    margin-top:22px;
    padding:20px;
    background:var(--cream);
    border-radius:8px;
    border-left:4px solid var(--gold);
    display:none;
}

.file-info h6{
    color:var(--ink);
    margin-bottom:12px;
    font-weight:500;
}

.file-info p{
    color:var(--ink-muted);
    line-height:1.8;
}

/* PROGRESS */

.progress{
    height:10px;
    border-radius:20px;
    margin-top:18px;
    display:none;
    background:var(--border);
    overflow:hidden;
}

.progress-bar{
    background:linear-gradient(to right,var(--gold),var(--gold-light));
    border-radius:20px;
}

/* BUTTONS */

.btn-primary{
    height:48px;
    background:var(--gold);
    border:none;
    border-radius:4px;
    font-size:0.74rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transition:0.2s;
}

.btn-primary:hover{
    background:#9A7A22;
    transform:translateY(-2px);
}

.btn-outline-secondary{
    border:1px solid var(--border-dark);
    color:var(--ink-muted);
    padding:11px 22px;
    border-radius:4px;
    background:transparent;
    font-size:0.74rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transition:0.2s;
}

.btn-outline-secondary:hover{
    background:var(--cream);
    border-color:var(--ink);
    color:var(--ink);
}

/* BACK LINK */

.back-link{
    text-align:center;
    margin-top:1.8rem;
    padding-top:1.5rem;
    border-top:1px solid var(--border);
}

/* RESPONSIVE */

@media(max-width:992px){

    .sidebar{
        width:80px;
    }

    .logo{
        font-size:1rem;
    }

    .logo-container{
        padding:20px 10px;
    }

    .sidebar ul li a span{
        display:none;
    }

    .sidebar-footer{
        display:none;
    }

    .upload-container{
        margin-left:100px;
        padding:20px;
    }
}

@media(max-width:768px){

    .sidebar{
        transform:translateX(-100%);
    }

    .upload-container{
        margin-left:auto;
        padding:16px;
    }

    .upload-card{
        padding:1.8rem;
    }

    .upload-header h2{
        font-size:1.9rem;
    }

    .file-drop-area{
        padding:36px 16px;
    }
}
    </style>
</head>
<body>
    <div class="sidebar">

    <div class="logo-container">
        <h2 class="logo">
            Soven <span>Legal</span>
        </h2>
    </div>

    <ul>

        <li>
            <a href="/dashboard">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li>
            <a href="/documents" class="active">
                <i class="fas fa-file-alt"></i>
                <span>Documents</span>
            </a>
        </li>

        <li>
            <a href="/lawyers">
                <i class="fas fa-user-tie"></i>
                <span>Find Lawyers</span>
            </a>
        </li>

        <li>
            <a href="/hired-lawyers">
                <i class="fas fa-briefcase"></i>
                <span>My Lawyers</span>
            </a>
        </li>

        <li>
            <a href="/chat-interface">
                <i class="fas fa-comments"></i>
                <span>Messages</span>
            </a>
        </li>

        <li>
            <a href="/legal-aid">
                <i class="fas fa-scale-balanced"></i>
                <span>Legal Help</span>
            </a>
        </li>

    </ul>

    <div class="sidebar-footer">
        <p>&copy; 2025 Soven Legal</p>
    </div>

</div>
    <div class="container upload-container">
        <div class="upload-card">
            <div class="upload-header">
                <h2>
                    <i class="fas fa-file-upload"></i>
                    Upload Case File
                </h2>
            </div>
            
            <form id="fileUploadForm">
                <div class="mb-4">
                    <label for="fileName" class="form-label">File Name/Description</label>
                    <input type="text" class="form-control" id="fileName" placeholder="Enter a name for this file" required>
                </div>
                
                <div class="mb-4">
                    <label for="fileCategory" class="form-label">File Category</label>
                    <select class="form-select" id="fileCategory" required>
                        <option value="">Select category</option>
                        <option value="case_document">Case Document</option>
                        <option value="evidence">Evidence</option>
                        <option value="legal_document">Legal Document</option>
                        <option value="correspondence">Correspondence</option>
                        <option value="court_order">Court Order</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Upload File</label>
                    <div class="file-drop-area" id="fileDropArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p class="mb-2">Drag & drop your file here</p>
                        <p class="text-muted small">or click to browse</p>
                        <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.txt,.xls,.xlsx">
                    </div>
                </div>
                
                <div class="file-info" id="fileInfo">
                    <h6>File Information:</h6>
                    <p id="fileDetails"></p>
                </div>
                
                <div class="progress" id="uploadProgress">
                    <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg" id="uploadBtn">
                        <i class="fas fa-upload me-2"></i>
                        Upload File
                    </button>
                </div>
            </form>
            
            <div class="back-link">
                <a href="/dashboard" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const fileDropArea = document.getElementById('fileDropArea');
        const fileInfo = document.getElementById('fileInfo');
        const fileDetails = document.getElementById('fileDetails');
        const uploadForm = document.getElementById('fileUploadForm');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressBar = uploadProgress.querySelector('.progress-bar');
        const uploadBtn = document.getElementById('uploadBtn');
        
        let selectedFile = null;
        
        // File drop functionality
        fileDropArea.addEventListener('click', () => fileInput.click());
        
        fileDropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropArea.classList.add('dragover');
        });
        
        fileDropArea.addEventListener('dragleave', () => {
            fileDropArea.classList.remove('dragover');
        });
        
        fileDropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            const maxSize = 10 * 1024 * 1024; // 10MB limit
            
            if (file.size > maxSize) {
                alert('File size too large. Maximum size is 10MB.');
                return;
            }
            
            selectedFile = file;
            const size = (file.size / 1024 / 1024).toFixed(2);
            
            fileDetails.innerHTML = `
                <strong>Name:</strong> ${file.name}<br>
                <strong>Type:</strong> ${file.type || 'Unknown'}<br>
                <strong>Size:</strong> ${size} MB
            `;
            fileInfo.style.display = 'block';
        }
        
        // Form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedFile) {
                alert('Please select a file to upload.');
                return;
            }
            
            const fileName = document.getElementById('fileName').value;
            const fileCategory = document.getElementById('fileCategory').value;
            
            uploadBtn.disabled = true;
            uploadProgress.style.display = 'block';
            
            try {
                // Simulate upload progress
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 5;
                    progressBar.style.width = `${progress}%`;
                    
                    if (progress >= 100) {
                        clearInterval(progressInterval);
                    }
                }, 100);
                
                // Convert file to base64
                const base64Data = await convertToBase64(selectedFile);
                
                const formData = {
                    file_name: fileName,
                    original_name: selectedFile.name,
                    file_type: selectedFile.name.split('.').pop().toLowerCase(),
                    file_size: selectedFile.size,
                    mime_type: selectedFile.type,
                    base64_data: base64Data,
                    file_category: fileCategory,
                    description: fileName
                };
                
                const response = await fetch('/api/upload-case-file', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('File uploaded successfully!');
                    window.location.href = '/dashboard';
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Upload error:', error);
                alert('Upload failed. Please try again.');
            } finally {
                uploadBtn.disabled = false;
                uploadProgress.style.display = 'none';
                progressBar.style.width = '0%';
            }
        });
        
        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>

<svg width="100%" viewBox="250 35 180 180" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Soven Legal logo v6</title>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0C96A"/>
      <stop offset="100%" stop-color="#C89B3C"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C060"/>
      <stop offset="100%" stop-color="#B8893A"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="190" y="10" width="300" height="360" rx="28" fill="#0B1525" style="fill:rgb(11, 21, 37);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="190" y="10" width="300" height="360" rx="28" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.35" style="fill:none;color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Shield -->
  <path d="M340 46 L402 70 L402 130 C402 172 374 196 340 210 C306 196 278 172 278 130 L278 70 Z" fill="url(#shieldGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Shield inner shadow -->
  <path d="M340 54 L396 76 L396 130 C396 168 370 190 340 202 C310 190 284 168 284 130 L284 76 Z" fill="none" stroke="#0B1525" stroke-width="1" opacity="0.3" style="fill:none;stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Scales inside shield -->
  <line x1="340" y1="80" x2="340" y2="192" stroke="#0B1525" stroke-width="2.6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:2.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="308" y1="93" x2="372" y2="93" stroke="#0B1525" stroke-width="2.6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:2.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="308" y1="93" x2="308" y2="124" stroke="#0B1525" stroke-width="1.5" stroke-dasharray="3 2.5" style="fill:rgb(0, 0, 0);stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:3px, 2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="372" y1="93" x2="372" y2="124" stroke="#0B1525" stroke-width="1.5" stroke-dasharray="3 2.5" style="fill:rgb(0, 0, 0);stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:3px, 2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M293 124 Q308 137 323 124" fill="none" stroke="#0B1525" stroke-width="2.4" stroke-linecap="round" style="fill:none;stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:2.4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M357 124 Q372 137 387 124" fill="none" stroke="#0B1525" stroke-width="2.4" stroke-linecap="round" style="fill:none;stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:2.4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="328" y1="192" x2="352" y2="192" stroke="#0B1525" stroke-width="2.6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(11, 21, 37);color:rgb(255, 255, 255);stroke-width:2.6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Divider -->
  <line x1="215" y1="232" x2="465" y2="232" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5" style="fill:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- SOVEN LEGAL stacked, same weight, same size -->
  <text x="340" y="272" font-family="Georgia, serif" font-size="24" font-weight="700" letter-spacing="5" fill="url(#goldGrad)" text-anchor="middle" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:24px;font-weight:700;text-anchor:middle;dominant-baseline:auto">SOVEN</text>

  <text x="340" y="298" font-family="Georgia, serif" font-size="24" font-weight="700" letter-spacing="5" fill="url(#goldGrad)" text-anchor="middle" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:24px;font-weight:700;text-anchor:middle;dominant-baseline:auto">LEGAL</text>

  <!-- Subtle tagline -->
  <text x="340" y="338" font-family="Inter, Arial, sans-serif" font-size="10" letter-spacing="3" fill="#C89B3C" opacity="0.45" text-anchor="middle" style="fill:rgb(200, 155, 60);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:Inter, Arial, sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">LEGALTECH · AI</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Soven Legal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="static/css/lawyer_login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-left">
      <div class="login-brand">
        <h1>Soven <span>Legal</span></h1>
        <p>Your legal practice, simplified</p>
      </div>
      <div class="login-features">
        <div class="feature">
          <i class="fas fa-file-contract"></i>
          <span>AI-powered document analysis</span>
        </div>
        <div class="feature">
          <i class="fas fa-calendar-alt"></i>
          <span>Smart deadline tracking</span>
        </div>
        <div class="feature">
          <i class="fas fa-scale-balanced"></i>
          <span>Comprehensive case management</span>
        </div>
      </div>
    </div>
    
    <div class="login-right">
      <div class="login-form-container">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Sign in to your legal dashboard</p>
        
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
            <i class="fas fa-envelope input-icon"></i>
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <i class="fas fa-lock input-icon"></i>
            <button type="button" class="toggle-password" id="togglePassword">
              <i class="far fa-eye"></i>
            </button>
          </div>
          
          <div class="form-options">
            <div class="remember-me">
              <input type="checkbox" id="remember" name="remember">
              <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>
          
          <button type="submit" class="btn-login">Sign In</button>
        </form>
        
        <div class="login-footer">
          Don't have an account? <a action = "/lawyer-signup">Sign up now</a>
        </div>
      </div>
    </div>
  </div>
  <script src="static/js/lawyer_login.js"></script>
</body>
</html>
